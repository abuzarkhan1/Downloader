<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
  <title>Universal Media Downloader</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            background: "hsl(240 10% 3.9%)",
            foreground: "hsl(0 0% 98%)",
            card: {
              DEFAULT: "hsl(240 6% 7%)",
              foreground: "hsl(0 0% 98%)"
            },
            popover: {
              DEFAULT: "hsl(240 6% 7%)",
              foreground: "hsl(0 0% 98%)"
            },
            primary: {
              DEFAULT: "oklch(0.66 0.16 252)",
              foreground: "#FFFFFF"
            },
            secondary: {
              DEFAULT: "hsl(240 6% 10%)",
              foreground: "hsl(240 5% 96%)"
            },
            muted: {
              DEFAULT: "hsl(240 6% 10%)",
              foreground: "hsl(240 5% 65%)"
            },
            accent: {
              DEFAULT: "hsl(240 6% 10%)",
              foreground: "hsl(240 5% 96%)"
            },
            border: "hsl(240 5% 17%)",
            input: "hsl(240 5% 17%)",
            ring: "oklch(0.66 0.16 252)"
          },
          borderRadius: {
            lg: "var(--radius)",
            md: "calc(var(--radius) - 2px)",
            sm: "calc(var(--radius) - 4px)"
          },
          fontFamily: {
            sans: ["Inter", "sans-serif"],
            display: ["Geist", "sans-serif"],
            mono: ["JetBrains Mono", "monospace"]
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --background: 240 10% 3.9%;
      --foreground: 0 0% 98%;
      --card: 240 6% 7%;
      --card-foreground: 0 0% 98%;
      --primary: oklch(0.66 0.16 252);
      --primary-foreground: #FFFFFF;
      --secondary: 240 6% 10%;
      --secondary-foreground: 240 5% 96%;
      --muted: 240 6% 10%;
      --muted-foreground: 240 5% 65%;
      --border: 240 5% 17%;
      --input: 240 5% 17%;
      --radius: 0.75rem;
    }

    body {
      background-color: hsl(var(--background));
      color: hsl(var(--foreground));
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }

    .glass-card {
      background-color: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius);
      box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.4);
    }

    .btn-primary-custom {
      background-color: oklch(0.66 0.16 252) !important;
      color: #FFFFFF !important;
    }

    input:-webkit-autofill,
    input:-webkit-autofill:hover, 
    input:-webkit-autofill:focus, 
    input:-webkit-autofill:active {
      -webkit-box-shadow: 0 0 0 30px hsl(var(--background)) inset !important;
      -webkit-text-fill-color: hsl(var(--foreground)) !important;
      transition: background-color 5000s ease-in-out 0s;
    }
  </style>
</head>
<body class="bg-background text-foreground min-h-screen pb-24 antialiased">
  <!-- Minimal Top Navigation Header -->
  <header class="fixed top-0 left-0 w-full z-50 flex items-center justify-between px-6 h-16 bg-background/90 backdrop-blur-md border-b border-border">
    <div class="flex items-center gap-3">
      <span class="font-display font-bold text-base tracking-tight text-foreground">Media Downloader</span>
    </div>
    <div class="flex items-center gap-2">
      <span class="text-xs font-mono text-muted-foreground px-2.5 py-1 rounded-md bg-secondary border border-border">v1.0</span>
    </div>
  </header>

  <!-- Main Container -->
  <main class="pt-24 px-5 max-w-lg mx-auto space-y-8">
    <!-- Hero Header -->
    <section class="text-center space-y-3 pt-6 flex flex-col items-center">
      <h1 class="font-display text-2xl sm:text-3xl font-extrabold tracking-tight text-foreground">
        Universal Media Downloader
      </h1>
      <p class="text-muted-foreground text-sm max-w-sm mx-auto leading-relaxed">
        Analyze and extract high-definition video formats or audio files for offline archiving.
      </p>
    </section>

    <!-- Supported Platforms Tags -->
    <section class="space-y-2.5">
      <label class="text-[11px] font-mono font-semibold tracking-wider text-muted-foreground uppercase ml-0.5">
        Supported Platforms
      </label>
      <div class="flex flex-wrap gap-2">
        <span class="px-3 py-1.5 rounded-lg bg-card text-foreground border border-border text-xs font-medium flex items-center gap-2">
          <span class="w-1.5 h-1.5 rounded-full bg-red-500"></span> YouTube
        </span>
        <span class="px-3 py-1.5 rounded-lg bg-card text-foreground border border-border text-xs font-medium flex items-center gap-2">
          <span class="w-1.5 h-1.5 rounded-full bg-cyan-400"></span> TikTok
        </span>
        <span class="px-3 py-1.5 rounded-lg bg-card text-foreground border border-border text-xs font-medium flex items-center gap-2">
          <span class="w-1.5 h-1.5 rounded-full bg-pink-500"></span> Instagram
        </span>
        <span class="px-3 py-1.5 rounded-lg bg-card text-foreground border border-border text-xs font-medium flex items-center gap-2">
          <span class="w-1.5 h-1.5 rounded-full bg-blue-500"></span> Facebook
        </span>
      </div>
    </section>

    <!-- Professional URL Input Card -->
    <section class="glass-card p-6 space-y-5">
      <div class="space-y-2">
        <label class="text-xs font-medium text-muted-foreground">Media URL</label>
        <div class="relative">
          <input 
            class="w-full h-12 bg-background border border-input rounded-lg px-3.5 font-mono text-sm text-foreground placeholder:text-muted-foreground/50 focus:outline-none focus:ring-2 focus:ring-[oklch(0.66_0.16_252)] focus:border-[oklch(0.66_0.16_252)] transition-all pr-10"
            placeholder="Paste media link here..." 
            type="text"
          />
          <button class="absolute right-3 top-1/2 -translate-y-1/2 text-muted-foreground hover:text-foreground transition-colors p-1">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M6 18L18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>

      <button class="w-full h-11 btn-primary-custom hover:opacity-95 text-white font-semibold text-sm rounded-lg flex items-center justify-center gap-2 transition-all active:scale-[0.99] shadow-sm">
        Analyze Link
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M14 5l7 7m0 0l-7 7m7-7H3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </section>
  </main>
</body>
</html>
